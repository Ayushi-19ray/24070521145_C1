<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-1: #b399d3;
            --bg-2: #e9defa;
            --ink: #2b2140;
            --ink-light: #ffffff;
            --plum: #4b2e83;
            --plum-dark: #362161;
            --gold: #b9902f;
            --gold-soft: #f6ecd6;
            --line: #e4dcf3;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;

            background-image: url("https://static.vecteezy.com/system/resources/previews/023/375/504/large_2x/minimal-workspace-on-the-desktop-of-a-home-office-with-a-notebook-a-cup-of-tea-stationery-a-bouquet-of-lilac-flowers-on-a-purple-background-flat-lay-top-view-photo.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

    min-height: 100vh;
    text-align: center;
    padding: 50px 16px 70px;
    color: var(--ink);
    margin: 0;
        }

        h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 52px;
            color: var(--plum-dark);
            margin: 0 0 4px;
        }

        /* the eyebrow + flourish that sit above/below the JS-generated heading */
        .eyebrow {
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--plum);
            font-weight: 600;
        }

        .flourish {
            width: 90px;
            height: 3px;
            margin: 10px auto 30px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            border-radius: 3px;
        }

        .receipt {
            width: 100%;
            max-width: 420px;
            margin: 20px auto;
            background: #fff;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 20px 40px -24px rgba(75, 46, 131, 0.35);
            border: 1px solid var(--line);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: var(--plum-dark);
            color: white;
            font-size: 15px;
            letter-spacing: 0.5px;
            padding: 14px 10px;
        }

        /* Grand Total row uses <th> twice, style it distinctly from the header row */
        tr:last-child th {
            background-color: var(--gold-soft);
            color: var(--plum-dark);
            font-size: 17px;
            border-top: 2px solid var(--plum-dark);
        }

        td {
            border-bottom: 1px solid var(--line);
            padding: 12px 10px;
            text-align: center;
            font-size: 14px;
        }

        tr:nth-child(even) td {
            background-color: #faf8ff;
        }

        tr:hover td {
            background-color: #f3ecff;
        }

        h3 {
            color: var(--ink-light);
            font-weight: 500;
            font-style: italic;
            font-size: 14px;
            margin-top: 22px;
        }

        .reload-btn {
            margin-top: 26px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
            padding: 12px 22px;
            border-radius: 10px;
            border: none;
            background: var(--plum-dark);
            color: #fff;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }

        .reload-btn:hover { background: var(--plum); }
        .reload-btn:active { transform: scale(0.97); }

        .error {
            color: #b3441f;
            background: #fbe9e2;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px dashed #b3441f;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="eyebrow">Ledger &middot; Line by line</div>
    <h2>Billing Calculator</h2>
    <div class="flourish"></div>

    <!-- JavaScript File: uses prompt() to collect input and document.write() to print the receipt below -->
    <script src="script.js"></script>

    <button class="reload-btn" onclick="location.reload()">🔄 Generate New Bill</button>

</body>

</html>
